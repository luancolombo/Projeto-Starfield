<svg width="920" height="220" viewBox="0 0 920 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Starfield logo</title>
  <desc id="desc">Stylized Starfield wordmark with orbital ring and horizontal lines.</desc>
  <rect width="920" height="220" fill="transparent"/>
  <g opacity="0.92">
    <line x1="36" y1="110" x2="250" y2="110" stroke="#EAF4F8" stroke-width="2.4"/>
    <line x1="670" y1="110" x2="884" y2="110" stroke="#EAF4F8" stroke-width="2.4"/>
